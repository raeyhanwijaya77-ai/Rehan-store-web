<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hanzz Store</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: url('https://files.catbox.moe/9w0n8y.jpg') no-repeat center center fixed;
  background-size: cover;
  color: white;
}

/* overlay gelap */
body::before {
  content: "";
  position: fixed;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.6);
  top: 0;
  left: 0;
  z-index: -1;
}

/* HEADER */
header {
  text-align: center;
  padding: 15px;
  font-size: 22px;
  font-weight: bold;
}

/* MENU */
.menu {
  text-align: center;
  margin-bottom: 10px;
}

.menu a {
  display: inline-block;
  padding: 10px 15px;
  border-radius: 10px;
  text-decoration: none;
  color: white;
  background: #25D366;
}

/* GRID */
.container {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
  gap: 15px;
  padding: 15px;
}

/* BORDER PELANGI */
.card {
  padding: 2px;
  border-radius: 15px;
  background: linear-gradient(270deg, red, orange, yellow, green, cyan, blue, violet, red);
  background-size: 400% 400%;
  animation: rainbow 6s linear infinite;
}

.inner {
  background: rgba(255,255,255,0.05);
  border-radius: 13px;
  padding: 10px;
  text-align: center;
}

@keyframes rainbow {
  0% {background-position:0%}
  100% {background-position:400%}
}

img {
  width: 100%;
  border-radius: 10px;
}

button {
  margin-top: 10px;
  padding: 8px;
  width: 100%;
  border: none;
  border-radius: 10px;
  background: #3b82f6;
  color: white;
  cursor: pointer;
}

/* PAYMENT */
.payment {
  margin: 20px;
  padding: 15px;
  background: rgba(255,255,255,0.05);
  border-radius: 15px;
  text-align: center;
}

.copy-btn {
  margin-left: 10px;
  padding: 3px 8px;
  border: none;
  border-radius: 5px;
  background: yellow;
  color: black;
  cursor: pointer;
}

/* ROKET */
.rocket {
  position: fixed;
  bottom: 10px;
  right: 10px;
  font-size: 30px;
  animation: fly 2s infinite;
}

@keyframes fly {
  0% { transform: translateY(0); }
  50% { transform: translateY(-10px); }
  100% { transform: translateY(0); }
}
</style>

</head>
<body>

<header>🚀 Hanzz Store 🚀</header>

<!-- CONTACT REHAN -->
<div class="menu">

  </a>
</div>

<!-- PRODUK -->

  <div class="card">

      <h3>Japost 🚀</h3>

  <div class="card">

  <div class="card">
    <div class="inner">
      <img src="https://source.unsplash.com/200x200/?whatsapp">
      <h3>Nokos WA Indo 🚀</h3>
      <p>Rp7.000</p>
      <button onclick="beli('Nokos WA Indo - Rp7.000')">Beli</button>

</div>

<!-- PEMBAYARAN -->
<div class="payment">

<h2> KALO MAU BELI BAYAR DULU BARU PENCET BELI! </h2>
  <p>
    DANA: <b id="dana">08984800635</b>
    <button class="copy-btn" onclick="copyText('dana')">Salin</button>
  </p>

  <p>
    GoPay: <b id="gopay">08984800635</b>
    <button class="copy-btn" onclick="copyText('gopay')">Salin</button>
  </p>

  <p>QRIS:</p>
  <img src="https://files.catbox.moe/uz0x19.png" width="200">

  <br><br>

  <a href="https://files.catbox.moe/uz0x19.png" download>
    <button style="background: yellow; color: black;">⬇️ Unduh QRIS</button>
  </a>

    ⚠️ Setelah pembayaran, kirim bukti ke WhatsApp admin
  </p>

<div class="rocket">🚀</div>

<!-- SOUND ANIME -->
<audio autoplay loop>
  <source src="https://files.catbox.moe/6nwjxj.mp3" type="audio/mp3">
</audio>

<script>
function beli(nama) {
  let nomor = "62895410354446";
  let pesan = "WOYY ADMIN REHAN,GW PENGEN BELI " + nama + ". GW KIRIM BUKTI NYA YA ON,OL.";

function copyText(id) {

  navigator.clipboard.writeText(text);

}
</script>

</body>
  </html>
