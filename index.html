<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hanzz Store</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;

  /* 🎌 BLUE LOCK BACKGROUND */
  background: url('https://files.catbox.moe/3v8b0c.jpg') no-repeat center center fixed;
  background-size: cover;
  color: white;
}

/* overlay dibuat lebih tipis biar anime keliatan */
body::before {
  content: "";
  position: fixed;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.35);
  top: 0;
  left: 0;
  z-index: -1;
}

/* HEADER */
header {
  text-align: center;
  padding: 15px;
  font-size: 22px;
  font-weight: bold;
}

/* MENU */
.menu {
  text-align: center;
  margin-bottom: 10px;
}

.menu a {
  display: inline-block;
  padding: 10px 15px;
  border-radius: 10px;
  text-decoration: none;
  color: white;
  background: #25D366;
}

/* GRID */
.container {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
  gap: 15px;
  padding: 15px;
}

/* CARD BORDER RAINBOW TIPIS */
.card {
  padding: 1.5px;
  border-radius: 15px;
  background: linear-gradient(270deg, red, orange, yellow, green, cyan, blue, violet, red);
  background-size: 400% 400%;
  animation: rainbow 10s linear infinite;
}

.inner {
  background: rgba(0,0,0,0.25);
  border-radius: 13px;
  padding: 10px;
  text-align: center;
}

@keyframes rainbow {
  0% {background-position:0%}
  100% {background-position:400%}
}

img {
  width: 100%;
  border-radius: 10px;
}

/* BUTTON */
button {
  margin-top: 10px;
  padding: 8px;
  width: 100%;
  border: none;
  border-radius: 10px;
  background: #3b82f6;
  color: white;
  cursor: pointer;
}

/* 💳 PAYMENT (RAINBOW + TRANSPARAN BIAR ANIME KELIATAN) */
.payment {
  margin: 20px;
  padding: 15px;
  text-align: center;
  border-radius: 15px;
  position: relative;
  background: rgba(0,0,0,0.25);
}

/* border rainbow tipis banget */
.payment::before {
  content: "";
  position: absolute;
  inset: 0;
  padding: 1.5px; /* 🔥 lebih tipis */
  border-radius: 15px;
  background: linear-gradient(270deg, red, orange, yellow, green, cyan, blue, violet, red);
  background-size: 400% 400%;
  animation: rainbow 12s linear infinite;

  -webkit-mask: 
    linear-gradient(#000 0 0) content-box, 
    linear-gradient(#000 0 0);
  -webkit-mask-composite: xor;
  mask-composite: exclude;

  pointer-events: none;
}

/* COPY BUTTON */
.copy-btn {
  margin-left: 10px;
  padding: 3px 8px;
  border: none;
  border-radius: 5px;
  background: yellow;
  color: black;
  cursor: pointer;
}

/* ROKET */
.rocket {
  position: fixed;
  bottom: 10px;
  right: 10px;
  font-size: 30px;
  animation: fly 2s infinite;
}

@keyframes fly {
  0% { transform: translateY(0); }
  50% { transform: translateY(-10px); }
  100% { transform: translateY(0); }
}
</style>

</head>
<body>

<header>🚀 Hanzz Store 🚀</header>

<div class="menu">
  <a href="https://wa.me/62895410354446">
    💬 Chat Admin
  </a>
</div>

<div class="container">

  <div class="card">
    <div class="inner">
      <img src="https://source.unsplash.com/200x200/?anime">
      <h3>Japost 🚀</h3>
      <p>Rp2.000</p>
      <button onclick="beli('Japost - Rp2.000')">Beli</button>
    </div>
  </div>

  <div class="card">
    <div class="inner">
      <img src="https://source.unsplash.com/200x200/?server">
      <h3>Panel Run Bot Unli 🚀</h3>
      <p>Rp5.000</p>
      <button onclick="beli('Panel Run Bot Unli - Rp5.000')">Beli</button>
    </div>
  </div>

</div>

<!-- 💳 PAYMENT -->
<div class="payment">
  <h2>💳 Metode Pembayaran</h2>

  <p>DANA: <b id="dana">08984800635</b>
    <button class="copy-btn" onclick="copyText('dana')">Salin</button>
  </p>

  <p>GoPay: <b id="gopay">08984800635</b>
    <button class="copy-btn" onclick="copyText('gopay')">Salin</button>
  </p>

  <p>QRIS:</p>
  <img src="https://files.catbox.moe/uz0x19.png" width="180">

  <br><br>

  <a href="https://files.catbox.moe/uz0x19.png" download>
    <button style="background: yellow; color: black;">⬇️ Unduh QRIS</button>
  </a>

  <p style="color:yellow;">
    ⚠️ Kirim bukti pembayaran ke admin
  </p>
</div>

<div class="rocket">🚀</div>

<audio autoplay loop>
  <source src="https://files.catbox.moe/6nwjxj.mp3" type="audio/mp3">
</audio>

<script>
function beli(nama) {
  let nomor = "62895410354446";
  let pesan = "Halo admin, saya mau beli " + nama;
  window.location.href = "https://wa.me/" + nomor + "?text=" + encodeURIComponent(pesan);
}

function copyText(id) {
  let text = document.getElementById(id).innerText;
  navigator.clipboard.writeText(text);
  alert("Tersalin!");
}
</script>

</body>
</html>
