<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hanzz Store</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: linear-gradient(135deg, #020617, #1e3a8a);
  color: white;
}

/* HEADER */
header {
  text-align: center;
  padding: 15px;
  font-size: 22px;
  font-weight: bold;
}

/* MENU */
.menu {
  text-align: center;
  margin-bottom: 10px;
}

.menu a {
  display: inline-block;
  margin: 5px;
  padding: 10px 15px;
  border-radius: 10px;
  text-decoration: none;
  color: white;
  background: #3b82f6;
}

.wa {
  background: #25D366;
}

/* GRID */
.container {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
  gap: 15px;
  padding: 15px;
}

/* CARD */
.card {
  background: rgba(255,255,255,0.05);
  border-radius: 15px;
  padding: 10px;
  text-align: center;
}

img {
  width: 100%;
  border-radius: 10px;
}

button {
  margin-top: 10px;
  padding: 8px;
  width: 100%;
  border: none;
  border-radius: 10px;
  background: #3b82f6;
  color: white;
  cursor: pointer;
}

/* PAYMENT */
.payment {
  margin: 20px;
  padding: 15px;
  background: rgba(255,255,255,0.05);
  border-radius: 15px;
  text-align: center;
}

/* ROKET */
.rocket {
  position: fixed;
  bottom: 10px;
  right: 10px;
  font-size: 30px;
  animation: fly 2s infinite;
}

@keyframes fly {
  0% { transform: translateY(0); }
  50% { transform: translateY(-10px); }
  100% { transform: translateY(0); }
}
</style>

</head>
<body>
