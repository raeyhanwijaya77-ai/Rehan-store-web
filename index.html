<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Website Jualan</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  color: white;
  background: url('https://i.pinimg.com/originals/5b/3c/2f/5b3c2f0b0f1b0a0d9a0a0a0a0a0a0a.jpg') no-repeat center center/cover;
}

/* overlay biar teks jelas */
.overlay {
  background: rgba(0,0,0,0.6);
  min-height: 100vh;
  padding: 20px;
}

/* header */
.header {
  text-align: center;
  padding: 30px 10px;
}

.header h1 {
  font-size: 32px;
}

/* product box */
.box {
  background: rgba(255,255,255,0.1);
  padding: 15px;
  margin: 10px 0;
  border-radius: 12px;
}

/* payment rainbow border */
.payment {
  margin-top: 20px;
  padding: 15px;
  border-radius: 15px;
  border: 3px solid;
  border-image: linear-gradient(45deg, red, orange, yellow, green, cyan, blue, violet) 1;
  background: rgba(0,0,0,0.4);
  text-align: center;
}

/* QR image */
.qr {
  width: 200px;
  margin-top: 10px;
  border-radius: 10px;
}

/* button */
.btn {
  display: inline-block;
  margin-top: 10px;
  padding: 10px 15px;
  background: #00c853;
  color: white;
  text-decoration: none;
  border-radius: 8px;
}
</style>

</head>

<body>
<div class="overlay">

  <div class="header">
    <h1>Website Jualan Digital</h1>
    <p>Produk murah & bisa nego harga</p>
  </div>

  <div class="box">
    <h3>🔥 Produk Premium</h3>
    <p>- Apk Premium (Japost) = Rp 2.000</p>
    <p>- Panel Run Bot Unli = Rp 5.000</p>
    <p>- Nokos WA Indo = Rp 5.000</p>
  </div>

  <div class="payment">
    <h3>💳 Payment QRIS</h3>
    <p>Scan atau download QRIS di bawah</p>

    <!-- ganti link QRIS kamu di sini -->
    <img class="qr" src="https://via.placeholder.com/200x200.png?text=QRIS" alt="QRIS">

    <br>
    <a class="btn" href="https://via.placeholder.com/200x200.png?text=QRIS" download>
      Download QRIS
    </a>
  </div>

</div>
</body>
</html>
